function badge(num,color){return '<div class="w-8 h-8 rounded-full '+color+' text-white flex items-center justify-center text-sm font-bold shrink-0">'+num+'</div>';}
function stepBadge(lbl,c){c=c||'bg-green-100 text-gkin-green';return '<div class="min-w-[1.75rem] h-7 rounded-full '+c+' text-xs font-bold flex items-center justify-center shrink-0 px-1">'+lbl+'</div>';}
function renderSection(s){
  var html='<section id="'+s.id+'" class="mb-10"><div class="flex items-center gap-3 mb-4">'+badge(s.num,s.color)+'<h2 class="text-xl font-bold text-gray-800">'+s.title+'</h2></div><div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5 space-y-4">';
  if(s.intro) html+='<p class="text-sm text-gray-600">'+s.intro+'</p>';
  if(s.steps) s.steps.forEach(function(step,i){
    html+='<div class="flex gap-3 items-start">'+stepBadge(i+1)+'<div class="text-sm text-gray-700">'+step.text+'</div></div>';
    if(step.sources) html+='<ul class="ml-10 space-y-1 list-disc list-outside text-sm text-gray-700 pl-4">'+step.sources.map(function(src){return '<li>'+src+'</li>';}).join('')+'</ul>';
  });
  if(s.substeps) s.substeps.forEach(function(sub){
    html+='<h3 class="text-sm font-semibold text-gray-700 border-b border-gray-100 pb-1">'+sub.heading+'</h3>';
    sub.items.forEach(function(item,i){html+='<div class="flex gap-3">'+stepBadge(String.fromCharCode(65+i))+'<div class="text-sm text-gray-700">'+item+'</div></div>';});
  });
  if(s.cards){html+='<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">';s.cards.forEach(function(c){html+='<div class="border border-gray-100 rounded-lg p-3 bg-gray-50"><p class="text-xs font-semibold text-gkin-green mb-1">'+c.icon+' '+c.title+'</p><p class="text-xs text-gray-600">'+c.text+'</p></div>';});html+='</div>';}
  if(s.faqs) s.faqs.forEach(function(faq,i){var bdr=i<s.faqs.length-1?'border-b border-gray-100 pb-4':'';html+='<div class="'+bdr+'"><p class="text-sm font-semibold text-gray-800 mb-1">'+faq.q+'</p><p class="text-sm text-gray-600">'+faq.a+'</p></div>';});
  if(s.notes) s.notes.forEach(function(n){var cls=n.type==='amber'?'bg-amber-50 border-amber-200 text-amber-800':'bg-blue-50 border-blue-200 text-blue-800';html+='<div class="'+cls+' border rounded-lg p-3 text-xs">'+n.text+'</div>';});
  html+='</div></section>';
  return html;
}

function renderHelp(lang){
  var d=HELP[lang]||HELP.nl;
  document.getElementById('hdr-sub').textContent=d.subtitle;
  document.getElementById('back-lbl').textContent=d.back;
  document.getElementById('footer-lbl').textContent=d.footer;
  document.getElementById('toc-title').textContent='\uD83D\uDCCB '+d.toc;
  document.getElementById('toc-list').innerHTML=d.sections.map(function(s){return '<li><a href="#'+s.id+'" class="hover:underline">'+s.num+'. '+s.title+'</a></li>';}).join('');
  document.getElementById('help-content').innerHTML=d.sections.map(renderSection).join('');
  document.querySelectorAll('.lang-btn').forEach(function(btn){
    var active=btn.dataset.lang===lang;
    btn.className='lang-btn text-xs px-2 py-1 rounded '+(active?'bg-white text-gkin-green font-semibold':'text-white');
  });
}

(function(){
  var LANG_KEY='gkin_lang';
  var cur=localStorage.getItem(LANG_KEY)||'nl';
  renderHelp(cur);
  document.querySelectorAll('.lang-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      cur=btn.dataset.lang;
      localStorage.setItem(LANG_KEY,cur);
      renderHelp(cur);
    });
  });
})();
</script>
