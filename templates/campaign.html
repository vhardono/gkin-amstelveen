<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GKIN Amstelveen – MailerLite Campaign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { gkin: { green: '#3A7C22', dark: '#2d6119' } } } }
        }
    </script>
    <style>
        html { overflow-y: scroll; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
        .preview-frame { background: white; border: 1px solid #e0e0e0; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="bg-gkin-green shadow-md">
        <div class="max-w-2xl mx-auto px-6 py-5 flex items-center gap-4">
            <a href="/"><img src="/static/logo2.png" alt="GKIN Logo" class="h-12 w-12 object-contain shrink-0"></a>
            <div>
                <h1 class="text-white text-2xl font-bold tracking-tight">GKIN Amstelveen</h1>
                <p class="text-green-100 text-sm mt-0.5">MailerLite Campaign Generator</p>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-2xl mx-auto px-6 py-8">
        <a href="/" class="inline-flex items-center gap-1 text-sm text-gkin-green hover:text-gkin-dark mb-5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Terug
        </a>

        <!-- Info card -->
        <div class="bg-green-50 border border-green-200 rounded-xl p-4 mb-6 text-sm text-green-800">
            Genereer een MailerLite e-mailcampagne gebaseerd op mededelingen en liturgie gegevens.
        </div>

        <!-- API Status -->
        <div id="apiStatusBox" class="hidden mb-5 rounded-lg p-3 border text-sm"></div>

        <!-- Date Selection -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-5">
            <h2 class="text-base font-semibold text-gkin-green mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                Selecteer datum
            </h2>
            <select id="dateSelect" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:outline-none focus:ring-2 focus:ring-gkin-green">
                <option value="">-- Kies een datum --</option>
                {% for d in dates %}
                <option value="{{ d.value }}" 
                        data-predikant="{{ d.predikant }}"
                        data-ovd="{{ d.ovd }}"
                        data-beamer="{{ d.beamer }}"
                        data-voorzangers="{{ d.voorzangers }}">
                    {{ d.label }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Campaign Options -->
        <div id="campaignOptions" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-5">
            <h2 class="text-base font-semibold text-gkin-green mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                Campagne opties
            </h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Onderwerp regel</label>
                    <input type="text" id="subjectLine" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gkin-green" placeholder="Automatisch gegenereerd...">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Interne naam</label>
                    <input type="text" id="campaignName" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gkin-green" placeholder="Automatisch gegenereerd...">
                </div>
                
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="scheduleSend" class="rounded border-gray-300">
                    <label for="scheduleSend" class="text-sm text-gray-700">Inplannen voor zaterdag 09:00</label>
                </div>
            </div>
        </div>

        <!-- OLE Template Fields -->
        <div id="oleTemplateFields" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-5">
            <h2 class="text-base font-semibold text-gkin-green mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
                </svg>
                OLE Dienst Inhoud
            </h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Thema</label>
                    <input type="text" id="themeInput" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gkin-green" placeholder="Bijv: Ga en verkondigt het Evangelie">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Bijbeltekst</label>
                    <input type="text" id="bibleVerseInput" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gkin-green" placeholder="Bijv: Marcus 16:9-20">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">YouTube Livestream Link</label>
                    <input type="url" id="youtubeInput" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gkin-green" placeholder="https://youtube.com/live/...">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Liturgie Document URL</label>
                    <input type="url" id="liturgieUrlInput" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gkin-green" placeholder="https://... (upload naar MailerLite bestanden)">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Collecte/Tikkie URL</label>
                    <input type="url" id="collecteUrlInput" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gkin-green" placeholder="https://www.ing.nl/payreq/...">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">QR Code Afbeelding URL</label>
                    <input type="url" id="qrUrlInput" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gkin-green" placeholder="https://... (upload naar MailerLite bestanden)">
                </div>
            </div>
            
            <div class="mt-4 bg-amber-50 border border-amber-200 rounded-lg p-3 text-sm text-amber-800">
                <strong>Tip:</strong> Upload de liturgie PDF en QR code eerst naar MailerLite Bestanden, en plak hier de URL.
            </div>
        </div>

        <!-- Preview Section -->
        <div id="previewSection" class="hidden mb-5">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-base font-semibold text-gkin-green">Voorbeeld</h2>
                <button type="button" id="refreshPreviewBtn" class="text-sm text-gkin-green hover:text-gkin-dark flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Vernieuwen
                </button>
            </div>
            <div id="previewContainer" class="preview-frame rounded-lg overflow-hidden">
                <!-- Preview iframe will be inserted here -->
            </div>
        </div>

        <!-- Action Buttons -->
        <div id="actionButtons" class="hidden flex gap-3">
            <button type="button" id="testConnectionBtn" 
                    class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-3 px-4 rounded-xl transition flex items-center justify-center gap-2">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                Test API
            </button>
            
            <button type="button" id="createCampaignBtn" 
                    class="flex-[2] bg-gkin-green hover:bg-gkin-dark text-white font-semibold py-3 px-6 rounded-xl shadow transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                <svg id="btnIcon" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                <svg id="btnSpinner" class="w-5 h-5 spinner hidden shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke-width="3" stroke-dasharray="60" stroke-dashoffset="15"/>
                </svg>
                <span id="btnText">Campagne aanmaken</span>
            </button>
        </div>

        <!-- Result -->
        <div id="resultBox" class="hidden mt-5 rounded-lg p-4 border text-sm"></div>

    </main>

    <script>
        // --- Elements ---
        const dateSelect = document.getElementById('dateSelect');
        const campaignOptions = document.getElementById('campaignOptions');
        const oleTemplateFields = document.getElementById('oleTemplateFields');
        const previewSection = document.getElementById('previewSection');
        const actionButtons = document.getElementById('actionButtons');
        const subjectLine = document.getElementById('subjectLine');
        const campaignName = document.getElementById('campaignName');
        const themeInput = document.getElementById('themeInput');
        const bibleVerseInput = document.getElementById('bibleVerseInput');
        const youtubeInput = document.getElementById('youtubeInput');
        const liturgieUrlInput = document.getElementById('liturgieUrlInput');
        const collecteUrlInput = document.getElementById('collecteUrlInput');
        const qrUrlInput = document.getElementById('qrUrlInput');
        const previewContainer = document.getElementById('previewContainer');
        const resultBox = document.getElementById('resultBox');
        const apiStatusBox = document.getElementById('apiStatusBox');
        
        let currentPreviewData = null;

        // --- API Status Check ---
        async function checkApiStatus() {
            try {
                const resp = await fetch('/campaign/api-status');
                const data = await resp.json();
                
                if (data.success) {
                    apiStatusBox.className = 'mb-5 rounded-lg p-3 border text-sm bg-green-50 border-green-200 text-green-800';
                    apiStatusBox.innerHTML = `✓ MailerLite API verbonden (${data.groups_count} groepen gevonden)`;
                } else {
                    apiStatusBox.className = 'mb-5 rounded-lg p-3 border text-sm bg-red-50 border-red-200 text-red-800';
                    apiStatusBox.innerHTML = `✗ MailerLite API fout: ${data.error || 'Onbekende fout'}`;
                }
                apiStatusBox.classList.remove('hidden');
            } catch (err) {
                apiStatusBox.className = 'mb-5 rounded-lg p-3 border text-sm bg-amber-50 border-amber-200 text-amber-800';
                apiStatusBox.innerHTML = '⚠ Kon API status niet controleren';
                apiStatusBox.classList.remove('hidden');
            }
        }
        
        checkApiStatus();

        // --- Date Selection ---
        dateSelect.addEventListener('change', async () => {
            const selectedDate = dateSelect.value;
            if (!selectedDate) {
                campaignOptions.classList.add('hidden');
                oleTemplateFields.classList.add('hidden');
                previewSection.classList.add('hidden');
                actionButtons.classList.add('hidden');
                return;
            }
            
            // Clear previous values
            themeInput.value = '';
            bibleVerseInput.value = '';
            youtubeInput.value = '';
            liturgieUrlInput.value = '';
            collecteUrlInput.value = '';
            qrUrlInput.value = '';
            subjectLine.value = '';
            campaignName.value = '';
            
            // Clear status messages
            const qrStatus = document.getElementById('qrStatus');
            const preekStatus = document.getElementById('preekStatus');
            if (qrStatus) qrStatus.innerHTML = '';
            if (preekStatus) preekStatus.innerHTML = '';
            
            // Clear window variables
            window.oleLocation = '';
            window.oleTime = '';
            window.olePredikant = '';
            
            // Auto-fetch OLE data from email (includes QR and Tikkie URL)
            await fetchOLEData(selectedDate);
            
            await loadPreview(selectedDate);
            campaignOptions.classList.remove('hidden');
            oleTemplateFields.classList.remove('hidden');
            previewSection.classList.remove('hidden');
            actionButtons.classList.remove('hidden');
        });
        
        // --- Fetch OLE Data from Email (QR + Tikkie URL) ---
        async function fetchOLEData(date) {
            // 1. Fetch OLE preekroster data (location, time, predikant)
            try {
                const rosterResp = await fetch('/fetch-ole-preekroster', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date })
                });
                const rosterData = await rosterResp.json();
                
                const locationField = document.getElementById('locationInput') || document.getElementById('oleLocation');
                const timeField = document.getElementById('timeInput') || document.getElementById('oleTime');
                
                if (rosterData.found) {
                    // Store location, time, AND predikant for use in email generation
                    window.oleLocation = rosterData.location;  // AM, DH, TB, etc.
                    window.oleTime = rosterData.time;  // 10.00u, 10.30u, etc.
                    window.olePredikant = rosterData.predikant;  // ds. Name from OLE preekroster
                    
                    // Show status
                    const preekStatus = document.getElementById('preekStatus') || createPreekStatusElement();
                    preekStatus.innerHTML = `<span class="text-green-600">✓ OLE preekroster gevonden: ${rosterData.location} · ${rosterData.time} · ${rosterData.predikant}</span>`;
                } else {
                    window.olePredikant = '';  // Clear if not found
                    const preekStatus = document.getElementById('preekStatus') || createPreekStatusElement();
                    preekStatus.innerHTML = `<span class="text-amber-600">⚠ ${rosterData.error || 'Geen OLE preekroster data'}</span>`;
                }
            } catch (err) {
                console.error('OLE preekroster fetch error:', err);
            }
            
            // 2. Fetch QR and Tikkie URL from email
            try {
                const resp = await fetch('/fetch-email-collecte', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date })
                });
                const data = await resp.json();
                
                const collecteField = document.getElementById('collecteUrlInput');
                const qrField = document.getElementById('qrUrlInput');
                const qrStatus = document.getElementById('qrStatus') || createQRStatusElement();
                
                if (resp.status === 401 || data.error === 'login_required') {
                    qrStatus.innerHTML = `<span class="text-amber-600">⚠ Niet ingelogd bij Outlook - log in bij Mededelingen om auto-fetch te gebruiken</span>`;
                    return;
                }
                
                // Fill Tikkie URL
                if (data.ole_url) {
                    collecteField.value = data.ole_url;
                }
                
                // Handle QR code
                if (data.ole_qr) {
                    // Upload to Brevo and get file ID
                    const uploadResp = await fetch('/upload-to-brevo', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ local_path: data.ole_qr })
                    });
                    const uploadData = await uploadResp.json();
                    
                    if (uploadData.success) {
                        // Brevo returns file_id - need to manually get URL from Brevo interface
                        qrField.value = data.ole_qr.startsWith('http') ? data.ole_qr : `/uploads/${data.ole_qr}`;
                        qrStatus.innerHTML = `<span class="text-green-600">✓ QR code gevonden: ${data.ole_qr}<br><small>Geüpload naar Brevo (ID: ${uploadData.file_id}). Kopieer de URL uit Brevo bestandsbeheer naar het veld hierboven.</small></span>`;
                    } else {
                        // Fallback: use local path for preview, user can manually upload
                        qrField.value = data.ole_qr.startsWith('http') ? data.ole_qr : `/uploads/${data.ole_qr}`;
                        // Show detailed error
                        let errorDetail = uploadData.error || 'Onbekende fout';
                        if (uploadData.files_in_dir) {
                            errorDetail += `<br><small>Beschikbare bestanden: ${uploadData.files_in_dir.slice(0, 5).join(', ')}</small>`;
                        }
                        qrStatus.innerHTML = `<span class="text-amber-600">⚠ Upload mislukt: ${errorDetail}<br>Upload handmatig via Brevo en plak de URL hierboven</span>`;
                    }
                } else {
                    qrStatus.innerHTML = `<span class="text-amber-600">⚠ Geen OLE QR code gevonden in e-mail</span>`;
                }
                
            } catch (err) {
                console.error('OLE fetch error:', err);
                const qrStatus = document.getElementById('qrStatus') || createQRStatusElement();
                qrStatus.innerHTML = `<span class="text-gray-500">ℹ Auto-fetch niet beschikbaar - vul handmatig in</span>`;
            }
        }
        
        function createPreekStatusElement() {
            const container = document.getElementById('oleTemplateFields');
            const statusDiv = document.createElement('div');
            statusDiv.id = 'preekStatus';
            statusDiv.className = 'text-sm mt-2 mb-2';
            container.insertBefore(statusDiv, container.firstChild.nextSibling);
            return statusDiv;
        }
        
        function createQRStatusElement() {
            const qrField = document.getElementById('qrUrlInput');
            const statusDiv = document.createElement('div');
            statusDiv.id = 'qrStatus';
            statusDiv.className = 'text-sm mt-1';
            qrField.parentNode.appendChild(statusDiv);
            return statusDiv;
        }

        // --- Load Preview ---
        async function loadPreview(date) {
            setLoading(true);
            
            try {
                const resp = await fetch('/campaign/preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        date,
                        theme: themeInput.value,
                        bible_verse: bibleVerseInput.value,
                        youtube_link: youtubeInput.value,
                        liturgie_url: liturgieUrlInput.value,
                        collecte_url: collecteUrlInput.value,
                        qr_image_url: qrUrlInput.value,
                        ole_location: window.oleLocation || '',
                        ole_time: window.oleTime || '10:00',
                        ole_predikant: window.olePredikant || ''  // Use OLE predikant instead of takenrooster
                    })
                });
                
                const data = await resp.json();
                
                if (!resp.ok || data.error) {
                    showResult('Fout: ' + (data.error || 'Onbekende fout'), 'error');
                    return;
                }
                
                currentPreviewData = data;
                
                // Update form fields
                subjectLine.value = data.subject;
                campaignName.value = data.name;
                
                // Show preview using blob URL (handles large HTML better than srcdoc)
                const blob = new Blob([data.html_content], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                previewContainer.innerHTML = `<iframe src="${url}" class="w-full" style="min-height: 700px; border: 1px solid #e5e7eb; border-radius: 8px;"></iframe>`;
                
            } catch (err) {
                showResult('Netwerkfout: ' + err.message, 'error');
            } finally {
                setLoading(false);
            }
        }
        
        // Update preview when OLE fields change
        [themeInput, bibleVerseInput, youtubeInput, liturgieUrlInput, collecteUrlInput, qrUrlInput].forEach(input => {
            input.addEventListener('blur', () => {
                const selectedDate = dateSelect.value;
                if (selectedDate) {
                    loadPreview(selectedDate);
                }
            });
        });

        // --- Refresh Preview ---
        document.getElementById('refreshPreviewBtn').addEventListener('click', () => {
            const selectedDate = dateSelect.value;
            if (selectedDate) {
                loadPreview(selectedDate);
            }
        });

        // --- Test Connection ---
        document.getElementById('testConnectionBtn').addEventListener('click', async () => {
            const btn = document.getElementById('testConnectionBtn');
            btn.disabled = true;
            
            try {
                const resp = await fetch('/campaign/api-status');
                const data = await resp.json();
                
                if (data.success) {
                    showResult(`✓ API verbinding OK! Groepen: ${data.groups_count}`, 'success');
                } else {
                    showResult(`✗ API fout: ${data.error}`, 'error');
                }
            } catch (err) {
                showResult('Netwerkfout: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
            }
        });

        // --- Create Campaign ---
        document.getElementById('createCampaignBtn').addEventListener('click', async () => {
            if (!currentPreviewData) return;
            
            setLoading(true);
            
            try {
                const schedule = document.getElementById('scheduleSend').checked;
                
                const resp = await fetch('/campaign/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        date: dateSelect.value,
                        subject: subjectLine.value,
                        name: campaignName.value,
                        schedule: schedule,
                        theme: themeInput.value,
                        bible_verse: bibleVerseInput.value,
                        youtube_link: youtubeInput.value,
                        liturgie_url: liturgieUrlInput.value,
                        collecte_url: collecteUrlInput.value,
                        qr_image_url: qrUrlInput.value,
                        is_ole: true
                    })
                });
                
                const data = await resp.json();
                
                if (resp.ok && data.success) {
                    const dashboardUrl = `https://dashboard.mailerlite.com/campaigns/${data.campaign_id}`;
                    const statusText = data.scheduled ? 
                        '<strong>Status:</strong> Gepland (scheduled)' : 
                        '<strong>Status:</strong> Concept (draft) - je moet nog verzenden in MailerLite';
                    showResult(`✓ Campagne aangemaakt!<br><br>ID: ${data.campaign_id}<br>${statusText}<br><a href="${dashboardUrl}" target="_blank" class="text-gkin-green underline">Open in MailerLite Dashboard →</a>`, 'success');
                } else {
                    showResult('Fout bij aanmaken: ' + (data.error || 'Onbekende fout'), 'error');
                }
            } catch (err) {
                showResult('Netwerkfout: ' + err.message, 'error');
            } finally {
                setLoading(false);
            }
        });

        // --- Clear All Fields Helper ---
        function clearAllFields() {
            themeInput.value = '';
            bibleVerseInput.value = '';
            youtubeInput.value = '';
            liturgieUrlInput.value = '';
            collecteUrlInput.value = '';
            qrUrlInput.value = '';
            subjectLine.value = '';
            campaignName.value = '';
            
            const qrStatus = document.getElementById('qrStatus');
            const preekStatus = document.getElementById('preekStatus');
            if (qrStatus) qrStatus.innerHTML = '';
            if (preekStatus) preekStatus.innerHTML = '';
            
            window.oleLocation = '';
            window.oleTime = '';
            window.olePredikant = '';
        }

        // --- Helpers ---
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setLoading(loading) {
            const btnIcon = document.getElementById('btnIcon');
            const btnSpinner = document.getElementById('btnSpinner');
            const btnText = document.getElementById('btnText');
            const createBtn = document.getElementById('createCampaignBtn');
            
            if (loading) {
                btnIcon.classList.add('hidden');
                btnSpinner.classList.remove('hidden');
                btnText.textContent = 'Bezig...';
                createBtn.disabled = true;
            } else {
                btnIcon.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
                btnText.textContent = 'Campagne aanmaken';
                createBtn.disabled = false;
            }
        }

        function showResult(message, type) {
            resultBox.innerHTML = message;
            resultBox.className = 'mt-5 rounded-lg p-4 border text-sm ' + 
                (type === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 
                 type === 'success' ? 'bg-green-50 border-green-200 text-green-800' :
                 'bg-gray-50 border-gray-200 text-gray-800');
            resultBox.classList.remove('hidden');
        }
    </script>

</body>
</html>
